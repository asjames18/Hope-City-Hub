<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#004E59" />
    <title>Offline | Hope City Highlands</title>
    <style>
      :root {
        color-scheme: light;
        --teal: #004e59;
        --lime: #a3d600;
        --paper: #f9fafb;
        --ink: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(163, 214, 0, 0.16), transparent 35%),
          linear-gradient(180deg, #ffffff 0%, var(--paper) 100%);
        color: var(--ink);
      }

      main {
        width: min(100%, 420px);
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 28px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: var(--teal);
        color: var(--lime);
        font-size: 34px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        color: var(--teal);
        font-size: 1.6rem;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.55;
        color: #475569;
      }

      a {
        display: inline-block;
        margin-top: 22px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--teal);
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">H</div>
      <h1>You’re Offline</h1>
      <p>Hope City Highlands will load again as soon as your connection comes back. If you already opened a page here before, some content may still be available offline.</p>
      <a href="/">Try Again</a>
    </main>
  </body>
</html>
